seed: 42
deterministic: True

# Optimizer / LR
optimizer: SGD
lr0: 0.01
lrf: 1.0
momentum: 0.9
weight_decay: 0.0001
lr_schedule: multistep
lr_step_epochs: [8, 11]
lr_gamma: 0.1
warmup_epochs: 0.0
warmup_iters: 500
warmup_start_factor: 0.001
warmup_momentum: 0.9
warmup_bias_lr: 0.0
nbs: 16

# Augmentations (SAR-safe, protocol-matched)
degrees: 0.0
translate: 0.0
scale: 0.2
shear: 0.0
perspective: 0.0
flipud: 0.5
fliplr: 0.5
rot90: 1.0
hsv_h: 0.0
hsv_s: 0.0
hsv_v: 0.0
mosaic: 0.0
mixup: 0.0
cutmix: 0.0
copy_paste: 0.0
close_mosaic: 0

